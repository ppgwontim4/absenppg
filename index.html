<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link rel="icon" href="1ZRarWhuUQ7IOQPXvwU3BvPA6_ki5rE09" type="image/png">
  <link rel="apple-touch-icon" href="1ZRarWhuUQ7IOQPXvwU3BvPA6_ki5rE09">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Presensi PPG">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root {
      --primary: #4361ee;
      --success: #2ec4b6;
      --danger: #e71d36;
      --bg: #f8f9fa;
    }
    body { font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; color: #333; }
    .card { background: white; width: 100%; max-width: 400px; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; border: 1px solid rgba(0,0,0,0.05); }
    
    /* Input Styling */
    input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
    input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 10px rgba(67, 97, 238, 0.1); }
    
    /* Button Styling */
    .btn { width: 100%; background: linear-gradient(135deg, var(--primary), #3a0ca3); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.3s; }
    .btn:active { transform: scale(0.98); }
    .btn-logout { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 10px; margin-top: 25px; font-size: 13px; }
    
    /* Info Card */
    .user-info { background: linear-gradient(to right, #f1f4ff, #ffffff); padding: 20px; border-radius: 15px; margin-bottom: 25px; border-left: 6px solid var(--primary); text-align: left; }
    
    #reader { width: 100%; border-radius: 20px; overflow: hidden; border: 3px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); background: #000; }
    .hidden { display: none !important; }

    /* --- POPUP MODAL MODERN --- */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; visibility: hidden; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    
    .modal-content { background: white; padding: 35px; border-radius: 30px; width: 85%; max-width: 320px; text-align: center; transform: translateY(50px); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
    .modal-overlay.active .modal-content { transform: translateY(0); }
    
    .icon-box { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; }
    .icon-success { background: #e7fbf9; color: var(--success); }
    .icon-error { background: #fff1f2; color: var(--danger); }
    
    .modal-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; color: #1a1a1a; }
    .modal-text { color: #666; line-height: 1.5; font-size: 15px; }
    .modal-btn { background: #1a1a1a; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; margin-top: 25px; cursor: pointer; width: 100%; font-size: 16px; }
  </style>
</head>
<body>

<div class="card">
  <h2 style="font-weight: 800; color: var(--primary);">PPG Presence</h2>

  <div id="login-section">
    <p style="color: #666;">Silahkan aktivasi akun Anda</p>
    <input type="text" id="idLogin" placeholder="Nomor ID Anggota">
    <button class="btn" id="btnLogin" onclick="loginUser()">Aktivasi HP</button>
  </div>

  <div id="scan-section" class="hidden">
    <div class="user-info">
      <small style="color: var(--primary); font-weight: bold; text-transform: uppercase;">Profil Anggota</small><br>
      <div style="font-size: 18px; font-weight: bold; margin-top: 5px;" id="displayNama">...</div>
      <div style="color: #888; font-size: 14px;" id="displayID"></div>
    </div>
    
    <p style="font-weight: bold; font-size: 14px; color: #555;">SCAN QR KEGIATAN</p>
    <div id="reader"></div>
    
    <button class="btn btn-logout" onclick="logout()">Keluar Akun</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content">
    <div class="icon-box" id="modalIconBox">✅</div>
    <div class="modal-title" id="modalTitle">Berhasil!</div>
    <div class="modal-text" id="modalMessage">Kehadiran Anda telah dicatat oleh sistem.</div>
    <button class="modal-btn" onclick="closeModal()">Selesai</button>
  </div>
</div>

<script>
  let html5QrCode = null;
  const config = { fps: 15, qrbox: { width: 250, height: 250 } };

  window.onload = function() {
    let savedID = localStorage.getItem("ppg_id");
    let savedNama = localStorage.getItem("ppg_nama");
    if (savedID && savedNama) {
      showScanPage(savedID, savedNama);
    }
  };

  function loginUser() {
    let id = document.getElementById('idLogin').value.trim();
    if(!id) return showPopup(false, "Opps!", "ID harus diisi.");
    
    document.getElementById('btnLogin').innerText = "Mengecek...";
    
    google.script.run.withSuccessHandler(function(res) {
      if(res.ditemukan) {
        localStorage.setItem("ppg_id", id);
        localStorage.setItem("ppg_nama", res.nama);
        showScanPage(id, res.nama);
      } else {
        showPopup(false, "Gagal", "ID tidak terdaftar di database.");
        document.getElementById('btnLogin').innerText = "Aktivasi HP";
      }
    }).cariIdentitasExternal(id);
  }

  function showScanPage(id, nama) {
    document.getElementById('login-section').classList.add('hidden');
    document.getElementById('scan-section').classList.remove('hidden');
    document.getElementById('displayNama').innerText = nama;
    document.getElementById('displayID').innerText = id;
    
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
      processAbsen(decodedText);
    }).catch(err => {
      console.log("Kamera error");
    });
  }

  function processAbsen(kegiatan) {
    html5QrCode.pause(true);
    
    let payload = {
      id: localStorage.getItem("ppg_id"),
      kegiatan: kegiatan,
      bulan: new Date().getMonth() + 1,
      tahun: new Date().getFullYear()
    };

    google.script.run.withSuccessHandler(function(res) {
      showPopup(true, "Berhasil!", "Absensi " + kegiatan + " telah tercatat.");
      html5QrCode.resume();
    }).simpanAbsensi(payload);
  }

  // --- FUNGSI LOGOUT BARU (TANPA CONFIRM BAWAAN) ---
  function logout() {
    // Kita panggil popup buatan kita sendiri, bukan confirm() bawaan HP
    showPopup(false, "Konfirmasi Keluar", "Apakah Anda yakin ingin mengganti ID di HP ini?", true);
  }

  // --- FUNGSI POPUP MODERN (DIUPDATE UNTUK HANDLE LOGOUT) ---
  function showPopup(isSuccess, title, message, isLogoutAction = false) {
    const overlay = document.getElementById('modalOverlay');
    const iconBox = document.getElementById('modalIconBox');
    const modalBtn = document.querySelector('.modal-btn');
    
    // Set konten popup
    document.getElementById('modalTitle').innerText = title;
    document.getElementById('modalMessage').innerText = message;
    
    if (isLogoutAction) {
      // Jika ini popup logout
      iconBox.innerText = "⚠️";
      iconBox.className = "icon-box icon-error"; // Warna merah/peringatan
      modalBtn.innerText = "Ya, Keluar";
      modalBtn.style.background = "#dc3545"; // Tombol merah
      
      // Aksi jika tombol "Ya, Keluar" diklik
      modalBtn.onclick = function() {
        if(html5QrCode) html5QrCode.stop().catch(()=>{});
        localStorage.clear(); // Hapus memori login
        
        // Pindah tampilan ke login
        document.getElementById('scan-section').classList.add('hidden');
        document.getElementById('login-section').classList.remove('hidden');
        document.getElementById('idLogin').value = "";
        
        closeModal();
      };
    } else {
      // Jika ini popup berhasil absen
      iconBox.innerText = isSuccess ? "✅" : "❌";
      iconBox.className = "icon-box " + (isSuccess ? "icon-success" : "icon-error");
      modalBtn.innerText = "Selesai";
      modalBtn.style.background = "#1a1a1a"; // Tombol hitam standar
      
      modalBtn.onclick = closeModal;
    }
    
    overlay.classList.add('active');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
  }
</script>
</body>
</html>
